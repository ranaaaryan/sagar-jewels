<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="Sagar Jewellers">
  <defs>
    <linearGradient id="sjGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6C373"/>
      <stop offset="0.5" stop-color="#C69544"/>
      <stop offset="1" stop-color="#8E6420"/>
    </linearGradient>
    <linearGradient id="sjGoldSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EED595"/>
      <stop offset="1" stop-color="#C69544"/>
    </linearGradient>
  </defs>

  <!-- Circular emblem -->
  <g transform="translate(22,24)">
    <!-- Outer filigree ring -->
    <circle r="22" fill="#1B0F0C"/>
    <circle r="22" fill="none" stroke="url(#sjGold)" stroke-width="1.4"/>
    <circle r="18.5" fill="none" stroke="url(#sjGold)" stroke-width="0.5"/>

    <!-- Decorative notches around the ring -->
    <g stroke="url(#sjGoldSoft)" stroke-width="0.9" stroke-linecap="round" fill="none">
      <circle r="20.3" stroke-dasharray="1.2 3.4"/>
    </g>

    <!-- Cardinal ornaments -->
    <g fill="url(#sjGoldSoft)">
      <circle cx="0" cy="-20.4" r="1"/>
      <circle cx="0" cy="20.4" r="1"/>
      <circle cx="-20.4" cy="0" r="1"/>
      <circle cx="20.4" cy="0" r="1"/>
    </g>

    <!-- JS monogram -->
    <text x="0" y="6.6"
          text-anchor="middle"
          font-family="'Cormorant Garamond','Noto Serif',Georgia,serif"
          font-weight="700"
          font-size="22"
          fill="#5B1E3E"
          letter-spacing="-1">JS</text>
  </g>

  <!-- Wordmark -->
  <text x="52" y="22"
        font-family="'Cormorant Garamond','Noto Serif',Georgia,serif"
        font-weight="600"
        font-size="18"
        fill="#5B1E3E"
        letter-spacing="0.4">Sagar</text>
  <text x="52" y="40"
        font-family="'Cormorant Garamond','Noto Serif',Georgia,serif"
        font-weight="600"
        font-size="18"
        fill="#5B1E3E"
        letter-spacing="0.4">Jewellers</text>
</svg>
