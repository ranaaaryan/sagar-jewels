<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Sagar Jewellers — Jewellery App (Print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #E4D7C3; font-family: 'Nunito Sans', sans-serif; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  .sheet {
    width: 1100px;
    min-height: 820px;
    margin: 0 auto;
    padding: 40px 40px 30px;
    background: linear-gradient(180deg, #EAE0D2 0%, #E1D4C1 100%);
    page-break-after: always;
    break-after: page;
    break-inside: avoid;
    display: flex;
    flex-direction: column;
  }
  .sheet:last-child { page-break-after: auto; break-after: auto; }

  .sheet-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 18px; color: #2A2724;
  }
  .sheet-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 500; margin: 0;
  }
  .sheet-sub {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: #6E655C; font-weight: 700;
  }

  .phones {
    display: flex; gap: 40px; justify-content: center; align-items: flex-start;
    flex: 1;
  }

  .phone-mount { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .phone-caption {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; color: #2A2724;
  }

  @page {
    size: 1180px 880px;
    margin: 0;
  }
  @media print {
    html, body { background: white; }
    .sheet { box-shadow: none; page-break-after: always; break-after: page; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
</head>
<body>

<div id="sheet-1" class="sheet">
  <div class="sheet-header">
    <h1 class="sheet-title">Sagar Jewellers · Jewellery App</h1>
    <span class="sheet-sub">Profile · Orders</span>
  </div>
  <div class="phones">
    <div class="phone-mount">
      <div id="mount-profile"></div>
      <div class="phone-caption">Profile</div>
    </div>
    <div class="phone-mount">
      <div id="mount-orders"></div>
      <div class="phone-caption">My Orders</div>
    </div>
  </div>
</div>

<div id="sheet-2" class="sheet">

    <span class="sheet-sub">Wishlist · Addresses</span>
  </div>
  <div class="phones">
    <div class="phone-mount">
      <div id="mount-wishlist"></div>
      <div class="phone-caption">Wishlist</div>
    </div>
    <div class="phone-mount">
      <div id="mount-addresses"></div>
      <div class="phone-caption">Saved Addresses</div>
    </div>
  </div>
</div>

<div id="sheet-3" class="sheet">

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

function StaticPhoneHost({ Page }) {
  const [state, setState] = React.useState(SEED);
  const go = () => {}; // no nav in print
  const T = window.JEWEL_TOKENS;
  return (
    <Phone>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>

}

function mount(id, Page) {
  const el = document.getElementById(id);
  if (el) ReactDOM.createRoot(el).render(<StaticPhoneHost Page={Page}/>);
}

mount('mount-profile',   window.ProfilePage);
mount('mount-orders',    window.OrdersPage);
mount('mount-wishlist',  window.WishlistPage);
mount('mount-addresses', window.AddressesPage);
mount('mount-loyalty',   window.LoyaltyPage);

// Auto-print once fonts + layout settle
(async () => {
  try { await document.fonts.ready; } catch {}
  setTimeout(() => window.print(), 800);
})();
</script>
</body>
</html>
